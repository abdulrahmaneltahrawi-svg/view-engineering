      /* حاوية الفلتر المركزية */
.projects-filter-container {
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 30px 0;
  direction: rtl; /* لترتيب الكلمات من اليمين لليسار */
}

/* القائمة الأفقية للأصناف */
.filter-tabs {
  display: flex;
  list-style: none;
  padding: 0;
  margin: 0;
  gap: 25px; /* المسافة بين الكلمات */
}

/* تنسيق عنصر الصنف المفرد */
.filter-item {
  font-size: 21px;
  font-weight: 500;
  color: #555555; /* لون رمادي هادئ للكلام غير النشط */
  cursor: pointer;
  padding-bottom: 6px;
  position: relative;
  transition: color 0.3s ease;
  user-select: none;
}

/* تأثير التمرير (Hover) فوق الصنف */
.filter-item:hover {
  color: #000000;
}

/* تنسيق الصنف النشط (المختار حالياً) ووضع الخط السفلي */
.filter-item.active {
  color: #000000; /* لون أسود غامق */
  font-weight: bold;
}

/* رسم الخط الأسود السفلي تحت الكلمة النشطة مثل الصورة */
.filter-item.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 2px; /* سماكة الخط */
  background-color: #333333; /* لون الخط السفلي */
  border-radius: 2px;
}
